<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random User Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main id="app">
        <h1 id="heading">Random User Generator</h1>
        <div id="container">
            <img alt="Random User Profile Picture" id="user-image" src="https://img.freepik.com/premium-vector/web-developer-design_24911-42711.jpg">
            <div id="user-info">
            <h2 id="username">Ansh Patel</h2>
            <p id="email">ansh123@gmail.com</p>
            <p id="location">Gujarat, India</p>
            </div>
        </div>
        <button id="generate-user">Generate User</button>
    </main>

    <script src="script.js"></script>
</body>
</html>
