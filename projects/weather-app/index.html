<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <main id="app">
            <h2 id="heading">Weather App</h2>
            <div id="user-input">
                <input type="text" placeholder="Search for a City" id="city-input">
                 <button id="search-btn">Search</button>
            </div>
            <div id="weather-info">
                <img src="https://static.vecteezy.com/system/resources/previews/026/571/030/non_2x/weather-icon-with-sun-and-cloud-on-transparent-background-free-png.png" alt="weather-icon" id="weather-icon">
                <p id="city">Search for a City</p>
                <p id="temp">--°C</p>
                <p id="weather-dec">--</p>
                <p id="humidity">--%</p>
                <p id="wind-speed">-- m/s</p>
            </div>
    </main>



    <script src="script.js"></script>
</body>
</html>
